<div class="page">
  <header class="header">
    <h1 class="title">AI Video Subtitler</h1>
    <p class="tagline">Upload a video, pick your target language, and get an SRT subtitle file.</p>
    <app-theme-toggle />
  </header>

  <main class="card">
    <app-drop-zone [(file)]="selectedFile" />

    <app-language-controls [(sourceLanguage)]="sourceLanguage" [(targetLanguage)]="targetLanguage" />

    <button class="btn-primary" [disabled]="!canSubmit()" (click)="submit()">
      @if (isProcessing()) {
      <span class="spinner"></span> Processing&hellip;
      } @else {
      Generate Subtitles
      }
    </button>

    @if (errorMessage()) {
    <div class="alert alert-error">{{ errorMessage() }}</div>
    }

    @if (srtContent()) {
    <app-subtitle-result [srtContent]="srtContent()!" [detectedLanguage]="detectedLanguage()" />
    }
  </main>
</div>
