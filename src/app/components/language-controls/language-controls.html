<div class="controls">
  <div class="field">
    <label for="source-lang">Source language</label>
    <select id="source-lang" [ngModel]="sourceLanguage()" (ngModelChange)="sourceLanguage.set($event)">
      <option value="">Auto-detect</option>
      @for (lang of languages; track lang.code) {
      <option [value]="lang.code">{{ lang.name }}</option>
      }
    </select>
  </div>

  <div class="field">
    <label for="target-lang">Target language</label>
    <select id="target-lang" [ngModel]="targetLanguage()" (ngModelChange)="targetLanguage.set($event)">
      @for (lang of languages; track lang.code) {
      <option [value]="lang.code">{{ lang.name }}</option>
      }
    </select>
  </div>
</div>
